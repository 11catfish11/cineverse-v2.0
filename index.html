  border:1px solid var(--line-2); box-shadow:0 18px 44px -14px rgba(0,0,0,.85);
  display:flex; align-items:center; justify-content:center;}
.dmodal-poster{position:absolute; inset:0; z-index:2; background-size:cover; background-position:center;
  opacity:0; transition:opacity .5s var(--ease);}
.dmodal-poster.loaded{opacity:1;}
.dmodal-poster-glyph{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:1; width:44%; color:#fff; opacity:.16;}
.dmodal-poster-glyph svg{width:100%; height:100%;}
.dmodal-header-info{flex:1; min-width:0; padding-bottom:.25rem;}
.dmodal-badges{display:flex; align-items:center; gap:.5rem; margin-bottom:.55rem;}
.imp-badge{display:inline-flex; align-items:center; gap:.32rem;
  padding:.28rem .62rem; border-radius:99px; font-size:.7rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase;}
.imp-badge.red{background:color-mix(in srgb,var(--red) 18%,transparent); color:var(--red); border:1px solid color-mix(in srgb,var(--red) 32%,transparent);}
.imp-badge.gold{background:color-mix(in srgb,var(--gold) 18%,transparent); color:var(--gold); border:1px solid color-mix(in srgb,var(--gold) 32%,transparent);}
.imp-badge.grey{background:var(--tap); color:var(--muted); border:1px solid var(--line);}
.dmodal-body{padding:1.3rem 1.6rem 1.8rem;}
.dmodal-title{font-family:var(--f-display); font-weight:400; font-size:1.95rem; line-height:1.02; letter-spacing:.02em; margin-bottom:.5rem; color:var(--ink); text-transform:uppercase;}
:lang(fa) .dmodal-title{font-family:'Vazirmatn',sans-serif; font-weight:900; font-size:1.4rem; text-transform:none; letter-spacing:0;}
.dmodal-meta{display:flex; flex-wrap:wrap; gap:.4rem;}
.dmeta-pill{display:inline-flex; align-items:center; gap:.3rem;
  font-size:.76rem; color:var(--muted); background:var(--tap);
  border:1px solid var(--line); padding:.28rem .6rem; border-radius:99px;}
.dmeta-pill.hi{color:var(--imdb); border-color:color-mix(in srgb,var(--imdb) 28%,transparent);
  background:color-mix(in srgb,var(--imdb) 8%,transparent); font-weight:700;}
.dmeta-pill svg{width:13px; height:13px;}
.dmodal-note{color:var(--muted); font-size:.9rem; line-height:1.82;
  padding:1rem 1.1rem; background:var(--tap); border-radius:var(--radius-sm);
  border:1px solid var(--line); margin-bottom:1rem;}
.dmodal-plot{color:var(--muted); font-size:.88rem; line-height:1.8; margin-bottom:1rem; display:none;
  padding:.9rem 1rem; background:var(--bg2); border-radius:var(--radius-sm);
  border:1px solid var(--line); border-inline-start:3px solid color-mix(in srgb,var(--accent) 45%,transparent);}
.dmodal-ext{display:flex; flex-wrap:wrap; gap:.5rem; margin-top:.2rem;}
.ext-link{display:inline-flex; align-items:center; gap:.35rem;
  padding:.45rem .85rem; border-radius:var(--radius-xs); font-size:.78rem; font-weight:600;
  text-decoration:none; border:1px solid var(--line); background:var(--tap);
  color:var(--muted); transition:.2s var(--ease);}
.ext-link:hover{border-color:var(--line-2); background:var(--panel-2); color:var(--ink);}
.ext-link svg{width:14px; height:14px;}
.dmodal-spinner{display:flex; align-items:center; gap:.45rem; font-size:.78rem;
  color:var(--faint); margin-bottom:.85rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.dmodal-spinner svg{animation:spin 1.1s linear infinite; width:15px; height:15px;}

/* ===================== LOGO CHIP UPGRADE ===================== */
.bm-chip .dot{background:var(--accent); box-shadow:0 0 10px var(--accent),0 0 20px color-mix(in srgb,var(--accent) 40%,transparent);}
/* solid, language-independent logo (no fragile gradient text-clip) */
.bm-logo{font-family:var(--f-display)!important; direction:ltr!important;}
.bm-logo .a{color:var(--ink)!important; background:none!important; -webkit-text-fill-color:currentColor;}
.bm-logo .b{color:var(--accent)!important; background:none!important; -webkit-text-fill-color:currentColor;
  text-shadow:0 0 20px color-mix(in srgb,var(--accent) 45%,transparent);}
:lang(fa) .bm-logo, :lang(fa) .wordmark, :lang(fa) .wordmark span{font-family:var(--f-display)!important;}

@media (max-width:480px){
  .dmodal-body{padding:1.1rem 1.1rem 1.5rem;}
  .dmodal-hero{height:150px;}
  .dmodal-header{padding:0 1.1rem; gap:.75rem; margin-top:-58px;}
  .dmodal-poster-card{flex-basis:82px; width:82px;}
  .dmodal-title{font-size:1.5rem;}
  :lang(fa) .dmodal-title{font-size:1.15rem;}
}

/* ===================== PHONE PASS (360–430px first) ===================== */
@media (max-width:640px){
  /* topbar: bottom nav already carries My List / Account, footer carries Support —
     keep only back, logo, search and language up top */
  .tb-right .iconbtn[data-nav="mylist"],
  .tb-right .iconbtn[data-nav="support"],
  .tb-right .iconbtn[data-auth-open]{display:none;}
  .bm-logo{font-size:1.3rem;}
  .bm-crumb{display:none;}
  .backbtn span{display:none;}       /* icon-only back button */
  .backbtn{padding:.42rem .55rem;}
  .iconbtn{width:36px; height:36px;}
  .lang-seg button{padding:.3rem .5rem;}
}
@media (max-width:560px){
  /* detail modal goes full screen — Netflix style */
  .dmodal-back{padding:0; align-items:stretch;}
  .dmodal{max-width:none; width:100%; max-height:none; height:100dvh; border-radius:0; border:none;}

}

   This is a local demo account: data lives in the visitor's own browser. It gates the watchlist
   and personalizes the UI. For real cross-device login + an owner-visible activity log, wire the
   free Firebase tier later (see FIREBASE_TODO in the notes). Passwords are lightly hashed only —

const OWNER_EMAIL = 'mahdi290689@gmail.com'; // this account is always the owner
const auth = {
  users: (()=>{ try{return JSON.parse(localStorage.getItem('cv_users')||'{}');}catch(e){return {};} })(),
  user:null, uid:null, profile:null, panelOpen:false, mode:'signin'
};

// Only restore a local session when Firebase isn't the source of truth
(function(){ try{ if(!window.CVF){ const e=localStorage.getItem('cv_session'); if(e && auth.users[e]){ auth.user=e; auth.profile=Object.assign({email:e, role:(e===OWNER_EMAIL?'owner':'user')}, auth.users[e]); } } }catch(e){} })();
function _hash(s){ let h=5381; for(let i=0;i<s.length;i++){ h=((h<<5)+h)^s.charCodeAt(i); } return (h>>>0).toString(36); }
function saveUsers(){ try{ localStorage.setItem('cv_users', JSON.stringify(auth.users)); }catch(e){} }
function currentUser(){ return auth.profile || (auth.user ? auth.users[auth.user] : null); }
function isSignedIn(){ return !!auth.user; }
function userRole(){ return (auth.profile && auth.profile.role) || 'user'; }
function isAdmin(){ const r=userRole(); return r==='owner' || r==='admin'; }
function fbReady(){ return !!(window.CVF && window.CVF.ready); }
function fbErrMsg(err){
  const c=(err&&err.code)||'';
  if(c.includes('email-already-in-use')) return t('authExists');
  if(c.includes('invalid-email')) return t('authBadEmail');
  if(c.includes('weak-password')) return t('authShortPass');
  if(c.includes('invalid-credential')||c.includes('wrong-password')||c.includes('user-not-found')) return t('authBadCreds');
  if(c.includes('network')) return t('authNetwork');
  return (err&&err.message)||'Error';
}
function logEvent(type, data){
  try{ const log=JSON.parse(localStorage.getItem('cv_log')||'[]');
    log.push({at:Date.now(), user:auth.user||null, type, data:data||null});
    localStorage.setItem('cv_log', JSON.stringify(log.slice(-500))); }catch(e){}
  if(fbReady() && window.CVF.log) try{ window.CVF.log(type, data?{data}:{}); }catch(e){}
}
function authError(msg){ const el=document.querySelector('.auth-error'); if(el){ el.textContent=msg; el.style.display='block'; } }
function authBusy(on){ const b=document.querySelector('[data-authsubmit]'); if(b){ b.disabled=on; b.style.opacity=on?'.6':''; } }
async function doSignUp(name, email, pass){
  email=(email||'').trim().toLowerCase();
  if(!name || !email || !pass) return authError(t('authFillAll'));
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) return authError(t('authBadEmail'));
  if(pass.length < 6) return authError(t('authShortPass'));
  if(fbReady()){
    authBusy(true);
    try{ await window.CVF.signUp(name.trim(), email, pass); closeAuthPanel(); }
    catch(err){ authBusy(false); authError(fbErrMsg(err)); }
    return;
  }
  if(auth.users[email]) return authError(t('authExists'));
  auth.users[email] = { name:name.trim(), pass:_hash(pass), created:Date.now() };
  saveUsers(); auth.user=email; auth.profile=Object.assign({email, role:(email===OWNER_EMAIL?'owner':'user')}, auth.users[email]);
  try{localStorage.setItem('cv_session',email);}catch(e){}
  logEvent('signup'); closeAuthPanel(); renderFull();
}
async function doSignIn(email, pass){
  email=(email||'').trim().toLowerCase();
  if(fbReady()){
    authBusy(true);
    try{ await window.CVF.signIn(email, pass); closeAuthPanel(); }
    catch(err){ authBusy(false); authError(fbErrMsg(err)); }
    return;
  }
  const u=auth.users[email];
  if(!u || u.pass!==_hash(pass||'')) return authError(t('authBadCreds'));
  auth.user=email; auth.profile=Object.assign({email, role:(email===OWNER_EMAIL?'owner':'user')}, u);
  try{localStorage.setItem('cv_session',email);}catch(e){}
  logEvent('signin'); closeAuthPanel(); renderFull();
}
async function signOut(){
  logEvent('signout');
  if(fbReady()){ try{ await window.CVF.signOut(); }catch(e){} closeAuthPanel(); return; }
  auth.user=null; auth.profile=null; try{localStorage.removeItem('cv_session');}catch(e){} closeAuthPanel(); renderFull();
}

function t(key){ return (STR[state.lang] && STR[state.lang][key]) || key; }
function L(o){ return o ? (o[state.lang] || o.en || '') : ''; }
function locNum(n){ return state.lang === 'fa' ? String(n).replace(/[0-9]/g, d => '۰۱۲۳۴۵۶۷۸۹'[+d]) : String(n); }

function subuTxt(k){ return (typeof SUBU!=='undefined' && SUBU[k]) ? SUBU[k][state.lang] : k; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ===================== THEME ===================== */
function setBrandTheme(brand){
  const r = document.documentElement.style;
  const set = (a,a2,deep) => {
    r.setProperty('--accent', a); r.setProperty('--accent-2', a2); r.setProperty('--accent-deep', deep);
    r.setProperty('--accent-soft', `color-mix(in srgb, ${a} 14%, transparent)`);
  };
  if(brand && BRANDS[brand]){ const b = BRANDS[brand]; set(b.accent, b.a2, b.deep); }
  else { set('#e23636', '#2f86ff', '#191038'); } // home: Marvel×DC duo aurora
}
function applyDir(){
  const el = document.documentElement;
  el.lang = state.lang === 'fa' ? 'fa' : 'en';
  el.dir  = state.lang === 'fa' ? 'rtl' : 'ltr';
  el.setAttribute('data-brand', state.brand || '');
}

function navTo(p){ if(p==='characters') state.character = null; state.page = p; renderFull(); window.scrollTo({top:0}); }
function openCharacter(id){ state.character = id; state.page = 'characters'; renderFull(); window.scrollTo({top:0}); }

/* ===================== FILTER / GROUP ===================== */
function brandItems(){ return DATA[state.brand] || []; }
function getViewItems(){ return brandItems().filter(it => it.views.includes(state.view)); }
function getFilteredItems(){
  const q = state.search.trim().toLowerCase();
  return getViewItems().filter(it => {
    if(!state.types.has(typeBucket(it.type))) return false;
    if(state.imp !== 'all' && it.imp !== state.imp) return false;
    if(q && !it.name.toLowerCase().includes(q)) return false;
    return true;
  });
}
function parseYear(y){ const m = String(y).match(/\d{4}/); return m ? parseInt(m[0],10) : 0; }
function isComingSoon(it){ const y = parseYear(it.year); return it.imdb == null && (y >= 2027 || y === 0); }
function sortItems(arr){
  const s = state.sort;
  if(s === 'name') return [...arr].sort((a,b) => a.name.localeCompare(b.name));
  if(s === 'year') return [...arr].sort((a,b) => parseYear(b.year) - parseYear(a.year));
  if(s === 'year_asc') return [...arr].sort((a,b) => parseYear(a.year) - parseYear(b.year));
  if(s === 'imdb') return [...arr].sort((a,b) => (b.imdb||0) - (a.imdb||0));
  return arr;
}
function groupKeyFor(it){ return state.view === 'character' ? (it.sub || 'other') : it.era; }
function groupTitleFor(k){ return state.view === 'character' ? subuTxt(k) : eraTxt(k); }
function getOrderedGroupKeys(){
  const order = [];
  getViewItems().forEach(it => { const k = groupKeyFor(it); if(!order.includes(k)) order.push(k); });
  return order;
}
function brandStats(brand){
  const arr = DATA[brand] || [];
  const c = f => arr.filter(f).length;
  return { total:arr.length, film:c(it=>typeBucket(it.type)==='film'), series:c(it=>typeBucket(it.type)==='series'),
    anim:c(it=>typeBucket(it.type)==='animation'), comics:(COMICS[brand]||[]).length, red:c(it=>it.imp==='red') };
}
function availableViews(brand){
  const arr = DATA[brand] || [];
  const has = v => arr.some(it => it.views.includes(v));
  const views = [['all', t('tabAll')]];
  if(has('timeline')) views.push(['timeline', t('tabTimeline')]);
  if(has('character') && BRANDS[brand].char) views.push(['character', L(BRANDS[brand].char)]);
  if(has('outside')) views.push(['outside', t('tabOutside')]);
  if((COMICS[brand]||[]).length) views.push(['comics', t('tabComics')]);
  return views;
}

  return arr.find(x => x.imp==='red' && typeBucket(x.type)==='film')
      || arr.find(x => x.imp==='red') || arr[0];
}

function renderListOnly(){
  const items = getFilteredItems();
  if(!items.length) return `<div class="empty">${ic('search')}<div>${t('emptyMsg')}</div></div>`;
  const keys = getOrderedGroupKeys();
  let html = '';
  keys.forEach(k => {
    const groupItems = sortItems(items.filter(it => groupKeyFor(it) === k));
    if(!groupItems.length) return;
    html += `<div class="era reveal"><div class="era-head">
      <span class="tick"></span><h3>${escapeHtml(groupTitleFor(k))}</h3><span class="rule"></span>
      <span class="cnt">${groupItems.length}</span></div>

/* ===================== CARD GRID ===================== */
// Gradient palettes per importance level
function posterGradient(item, brand){
  const b = BRANDS[brand] || BRANDS[state.brand] || {};
  const a = b.accent || '#e23636';
  const a2 = b.a2 || a;
  const deep = b.deep || '#1a1a2e';
  if(item.imp === 'red') return `linear-gradient(160deg, ${a} 0%, ${deep} 100%)`;
  if(item.imp === 'gold') return `linear-gradient(160deg, color-mix(in srgb,${a} 60%,#b8860b) 0%, ${deep} 100%)`;
  return `linear-gradient(160deg, color-mix(in srgb,${a} 35%,#1a1a2e) 0%, ${deep} 100%)`;
}
function movieCardHTML(it, brand){
  const b = BRANDS[brand] || BRANDS[state.brand] || {};
  const typeMap = {film:t('typeFilm'),series:t('typeSeries'),animation:t('typeAnimation'),special:t('typeSpecial')};
  const impDot = it.imp !== 'grey' ? `<span class="mc-imp-dot ${it.imp}"></span>` : '';
  const imdbB = it.imdb != null ? `<span class="mc-imdb">${ic('star')}${locNum(it.imdb.toFixed(1))}</span>` : '';
  const grad = posterGradient(it, brand || state.brand);
  const woNum = (typeof it.wo === 'number') ? `<span class="mc-wo">${locNum(String(it.wo).padStart(2,'0'))}</span>` : '';
  const newBadge = isComingSoon(it)
    ? `<span class="mc-new soon">${t('badgeSoon')}</span>`
    : (parseYear(it.year) >= 2026 ? `<span class="mc-new">${t('badgeNew')}</span>` : '');
  const cached = _posterUrlById[it.id];
  const bgCls = cached ? 'mc-poster-bg' : 'mc-poster-bg pending';
  const imgHtml = cached
    ? `<div class="mc-poster-img loaded" style="background-image:url(${cached})"></div>`
    : `<div class="mc-poster-img" id="mcp-${escapeHtml(it.id)}"></div>`;
  return `<div class="movie-card" data-entry-id="${escapeHtml(it.id)}" role="button" tabindex="0" aria-label="${escapeHtml(it.name)}">
    <div class="mc-poster">
      <div class="${bgCls}" style="background:${grad}"></div>
      ${imgHtml}
      <div class="mc-glyph" style="color:#fff">${brandGlyph(b.glyph)}</div>
      <div class="mc-overlay"></div>
      <div class="mc-badges">${newBadge}${impDot}${woNum}</div>
      ${imdbB}
      ${bookmarkBtn(it.id, 'mc-bookmark')}
      <span class="mc-type-badge">${escapeHtml(typeMap[it.type]||it.type)}</span>
      <div class="mc-hover-cta"><span>${t('summaryLabel')}</span></div>
    </div>
    <div class="mc-body">
      <div class="mc-name">${escapeHtml(it.name)}</div>
      <div class="mc-year">${escapeHtml(String(it.year))}</div>
    </div>
  </div>`;
}
function renderCardGrid(){
  const items = getFilteredItems();
  if(!items.length) return `<div class="empty">${ic('search')}<div>${t('emptyMsg')}</div></div>`;
  const keys = getOrderedGroupKeys();
  let html = '';
  keys.forEach(k => {
    const groupItems = sortItems(items.filter(it => groupKeyFor(it) === k));
    if(!groupItems.length) return;
    html += `<div class="era reveal">
      <div class="era-head"><span class="tick"></span><h3>${escapeHtml(groupTitleFor(k))}</h3><span class="rule"></span><span class="cnt">${locNum(groupItems.length)}</span></div>
      <div class="card-grid">${groupItems.map(it => movieCardHTML(it, state.brand)).join('')}</div>
    </div>`;
  });
  return html;
}

/* actor portraits — TMDB person search; the promise is memoized so an actor shared
   by several cards (or grid + detail) is only ever fetched once, via the shared queue */
const _personImgByName = {};
function initCharFaces(){
  document.querySelectorAll('[data-person-face]').forEach(el => {
    if(el.classList.contains('loaded')) return;
    const name = el.dataset.personFace;
    if(!name || !TMDB_KEY) return;
    if(_personImgByName[name] === undefined){
      _personImgByName[name] = queuedFetch(() =>
        apiGet(`https://api.themoviedb.org/3/search/person?api_key=${TMDB_KEY}&query=${encodeURIComponent(name)}`)
      ).then(d => {
        const p = d?.results?.[0];
        return p && p.profile_path ? `${TMDB_IMG}w185${p.profile_path}` : null;
      });
    }
    _personImgByName[name].then(url => {
      if(!url || !el.isConnected) return;
      el.style.backgroundImage = `url(${url})`; el.classList.add('loaded'); el.textContent = '';
    });
  });
}

function allItems(){ const out=[]; BRAND_ORDER.forEach(b => (DATA[b]||[]).forEach(it => out.push(it))); return out; }
function getBrowseItems(){
  const q = (state.browseSearch||'').trim().toLowerCase();
  return allItems().filter(it => {
    if(state.browseType !== 'all' && typeBucket(it.type) !== state.browseType) return false;
    if(q && !it.name.toLowerCase().includes(q)) return false;
    return true;
  });
}
function stripWrap(inner){
  return `<div class="nf-strip-wrap">
    <button class="nf-paddle prev" data-paddle="prev" aria-label="scroll">${ic('chevron')}</button>
    <div class="nf-strip">${inner}</div>
    <button class="nf-paddle next" data-paddle="next" aria-label="scroll">${ic('chevron')}</button>
  </div>`;
}
function nfStripRow(titleHtml, items){
  if(!items.length) return '';
  return `<div class="nf-row">
    <div class="nf-row-head"><div class="nf-row-title2">${titleHtml}</div></div>
    ${stripWrap(items.map(it => movieCardHTML(it, it.brand)).join(''))}
  </div>`;
}
function browseFeaturedList(){
  const pool = allItems().filter(it => (it.imp==='red'||it.imp==='gold') && it.imdb!=null && parseYear(it.year)>=2019);
  pool.sort((a,b)=> parseYear(b.year)-parseYear(a.year) || (b.imdb-a.imdb));
  // one per universe so the carousel has variety
  const seen = new Set(); const out = [];
  for(const it of pool){ if(seen.has(it.brand)) continue; seen.add(it.brand); out.push(it); if(out.length===6) break; }
  return out.length ? out : allItems().slice(0,3);
}
function heroSlideHTML(it, i){
  const b = BRANDS[it.brand]||{};
  const typeMap = {film:t('typeFilm'),series:t('typeSeries'),animation:t('typeAnimation'),special:t('typeSpecial')};
  const cached = _backdropUrlById[it.id];
  const imgHtml = cached
    ? `<div class="bhero-img loaded" style="background-image:url(${cached})" data-hero-flag="${escapeHtml(it.id)}"></div>`
    : `<div class="bhero-img" data-hero-flag="${escapeHtml(it.id)}"></div>`;
  const imdb = it.imdb!=null ? `<span class="bhero-pill hi">${ic('star')}${locNum(it.imdb.toFixed(1))} IMDb</span>` : '';
  return `<div class="bhero-slide ${i===0?'on':''}" data-slide="${i}" style="--b-accent:${b.accent}">
    <div class="bhero-bg" style="background:linear-gradient(135deg, ${b.accent}, ${b.deep||'#0a0e14'})"></div>
    ${imgHtml}
    <div class="bhero-shade"></div>
    <div class="bhero-content" data-entry-id="${escapeHtml(it.id)}" role="button" tabindex="0">
      <div class="bhero-kicker"><span class="em"></span>${t('featuredLabel')} · ${escapeHtml(b.logo||'')}</div>
      <div class="bhero-title">${escapeHtml(it.name)}</div>
      <div class="bhero-meta">${imdb}<span class="bhero-pill">${escapeHtml(typeMap[it.type]||it.type)}</span><span class="bhero-pill">${escapeHtml(String(it.year))}</span></div>
      <button class="bhero-btn" data-entry-id="${escapeHtml(it.id)}">${ic('layers')}<span>${t('viewDetails')}</span></button>
    </div>
  </div>`;
}
let _heroTimer = null, _heroIdx = 0, _heroCount = 0;
function heroGo(n){
  const slides = document.querySelectorAll('.bhero-slide');
  const dots = document.querySelectorAll('.bhero-dot');
  if(!slides.length) return;
  _heroIdx = ((n % slides.length) + slides.length) % slides.length;
  slides.forEach((s,i)=> s.classList.toggle('on', i===_heroIdx));
  dots.forEach((d,i)=> d.classList.toggle('on', i===_heroIdx));
}
function heroStart(){
  clearInterval(_heroTimer);
  if(_heroCount > 1) _heroTimer = setInterval(()=> heroGo(_heroIdx+1), 6000);
}
function renderBrowseHero(){
  const list = browseFeaturedList(); if(!list.length) return '';
  _heroIdx = 0; _heroCount = list.length;
  const dots = list.map((_,i)=>`<button class="bhero-dot ${i===0?'on':''}" data-herodot="${i}" aria-label="slide ${i+1}"></button>`).join('');
  const arrow = d => `<button class="bhero-arrow ${d}" data-heroarrow="${d}">${ic('chevron')}</button>`;
  return `<div class="bhero" data-hero-carousel dir="ltr">
    ${list.map(heroSlideHTML).join('')}
    ${arrow('prev')}${arrow('next')}
    <div class="bhero-dots">${dots}</div>
  </div>`;
}
function renderBrowseGrid(){
  const q = (state.browseSearch||'').trim().toLowerCase();
  let top = '';
  if(!q){ // curated rows (hidden while searching)
    const types = state.browseType==='all' ? ['film','series','animation'] : [state.browseType];
    const labelFor = {film:t('browseFilms'), series:t('browseSeries'), animation:t('browseAnim')};
    top += types.map(ty => {
      const items = allItems().filter(it=>typeBucket(it.type)===ty && it.imdb != null)
        .sort((a,b)=>parseYear(b.year)-parseYear(a.year)).slice(0,18);
      return nfStripRow(`${t('newestPrefix')} ${labelFor[ty]}`, items);
    }).join('');
    // Coming Soon: strictly unreleased — future year or no known date, and no rating yet
    const coming = allItems().filter(it => isComingSoon(it))
      .sort((a,b)=>(parseYear(a.year)||9999)-(parseYear(b.year)||9999)).slice(0,18);
    top += nfStripRow(t('comingSoonLabel'), coming);
  }
  const rows = BRAND_ORDER.map(bid => {
    let items = (DATA[bid]||[]).filter(it => {
      if(state.browseType !== 'all' && typeBucket(it.type) !== state.browseType) return false;
      if(q && !it.name.toLowerCase().includes(q)) return false;
      return true;
    });
    if(!items.length) return '';
    items = sortItems(items);
    const b = BRANDS[bid];
    return `<div class="nf-row">
      <div class="nf-row-head">
        <button class="nf-row-title" data-enter-brand="${bid}" style="--b-accent:${b.accent}">
          <span class="nf-dot" style="background:${b.accent};box-shadow:0 0 8px ${b.accent}"></span>${L(b)}
          <span class="nf-count">${locNum(items.length)}</span>
        </button>
        <button class="nf-row-all" data-enter-brand="${bid}"><span>${t('browseSeeAll')}</span>${ic('arrow')}</button>
      </div>
      ${stripWrap(items.map(it => movieCardHTML(it, bid)).join(''))}
    </div>`;
  }).filter(Boolean).join('');
  const body = top + rows;
  return body || `<div class="empty">${ic('search')}<div>${t('emptyMsg')}</div></div>`;
}
function renderBrowseAll(){
  const items = getBrowseItems();
  const typeChips = [['all',t('browseAllTypes')],['film',t('browseFilms')],['series',t('browseSeries')],['animation',t('browseAnim')]];
  const chips = typeChips.map(([k,l]) => `<button class="chip ${state.browseType===k?'active':''}" data-browsetype="${k}">${l}</button>`).join('');
  const q = (state.browseSearch||'').trim();
  const hero = q ? '' : renderBrowseHero(); // searching: results only, no carousel
  return `<div class="page-wide">
    ${hero}
    <div class="browse-bar">
      <div class="chips">${chips}</div>
      <div class="browse-bar-count"><span data-browse-count>${locNum(items.length)}</span> ${t('titlesCountWord')}</div>
    </div>
    <div id="content">${renderBrowseGrid()}</div>
  </div>`;
}
/* refresh only the browse results (keeps topbar search input alive & focused) */
function refreshBrowseResults(){
  const c = document.getElementById('content');
  if(!c){ renderFull(); return; }
  c.innerHTML = renderBrowseGrid();
  const cnt = document.querySelector('[data-browse-count]');
  if(cnt) cnt.textContent = locNum(getBrowseItems().length);
  // hero disappears while searching, returns when the query clears
  const q = (state.browseSearch||'').trim();
  const heroEl = document.querySelector('.bhero');
  if(q && heroEl){ clearInterval(_heroTimer); heroEl.remove(); }
  else if(!q && !heroEl){
    const bar = document.querySelector('.browse-bar');
    if(bar){ bar.insertAdjacentHTML('beforebegin', renderBrowseHero()); heroStart(); }
  }
  initReveal();
}

function renderFull(){
  const app = document.getElementById('app');
  loadWatchlist(); // always reflect the signed-in account (guests: empty)
  applyDir();
  setBrandTheme(state.brand);
  let body = '';
  if(state.page === 'home'){ body = renderHome(); }
  else if(state.page === 'about'){ body = renderAboutPage(); }
  else if(state.page === 'support'){ body = renderSupportPage(); }
  else if(state.page === 'mylist'){ body = renderMyList(); }
  else if(state.page === 'characters'){ body = renderCharactersPage(); }
  else if(state.page === 'browse'){ body = renderBrowseAll(); }
  else if(state.page === 'brand'){
    const contentArea = renderContent();
    const toggleBtn = `<button class="sb-toggle" data-sb-toggle="1">${ic('menu')||'☰'}<span>${t('switchUniverse')||'Universes'}</span></button>`;
    body = `<div class="brand-layout">
      ${renderSidebar()}
      <div class="main-content">
        ${renderBrandHeader()}
        ${toggleBtn}
        ${renderTabbar()}
        ${renderFilterbar()}
        <div id="content">${contentArea}</div>
      </div>
    </div>`;
  }
  app.innerHTML = renderTopbar() + body + renderFooter() + renderModal() + renderMobileNav();
  syncTopbarHeight();
  initReveal();
  if(state.page === 'browse') heroStart(); else clearInterval(_heroTimer);
}

  _heroTouchX = _heroTouchY = null;
  if(Math.abs(dx) > 48 && Math.abs(dx) > Math.abs(dy) * 1.5){
    heroGo(_heroIdx + (dx < 0 ? 1 : -1)); // swipe left = advance (hero is locked dir=ltr)
    heroStart();
  }
}, {passive:true});

/* ===================== REVEAL ON SCROLL ===================== */
let _io = null;
function initReveal(){
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const els = document.querySelectorAll('.reveal:not(.in)');
  if(reduce || _skipReveal){ els.forEach(e => e.classList.add('in')); _skipReveal = false; initCardImages(); initPortalImages(); initHeroImages(); initCharFaces(); return; }
  if(_io) _io.disconnect();
  _io = new IntersectionObserver((entries) => {
    entries.forEach(en => { if(en.isIntersecting){ en.target.classList.add('in'); _io.unobserve(en.target); } });
  }, {threshold:.02, rootMargin:'0px 0px -30px 0px'});
  const vh = window.innerHeight || 800;
  els.forEach(e => {
    // anything already in (or near) the viewport reveals immediately — never leave content invisible
    const r = e.getBoundingClientRect();
    if(r.top < vh * 1.15 && r.bottom > 0){ e.classList.add('in'); }
    else _io.observe(e);
  });
  initCardImages();
  initPortalImages();
  initHeroImages();
  initCharFaces();
}
function initHeroImages(){
  // hero slides demand REAL wide backdrops (w1280); slides without one leave the rotation
  document.querySelectorAll('.bhero-img[data-hero-flag]').forEach(el => {
    if(el.classList.contains('loaded')) return;
    const fid = el.dataset.heroFlag;
    const found = fid && findEntry(fid);
    if(!found) return;
    fetchMediaQueued(found.item).then(md => {
      if(md && md.backdrop){
        const img = new Image();
        img.referrerPolicy = 'no-referrer';
        img.onload = () => { el.style.backgroundImage = `url(${img.src})`; el.classList.add('loaded'); _backdropUrlById[fid] = img.src; };
        img.onerror = () => dropHeroSlide(el);
        img.src = md.backdrop;
      } else dropHeroSlide(el);
    });
  });
}
function dropHeroSlide(imgEl){
  const slide = imgEl.closest('.bhero-slide'); if(!slide) return;
  const idx = slide.dataset.slide;
  const dot = document.querySelector(`.bhero-dot[data-herodot="${idx}"]`);
  const wasOn = slide.classList.contains('on');
  slide.remove(); if(dot) dot.remove();
  _heroCount = document.querySelectorAll('.bhero-slide').length;
  if(wasOn && _heroCount) heroGo(0);
  if(_heroCount <= 1) clearInterval(_heroTimer);
}
function initPortalImages(){
  // load flagship backdrops eagerly (home tiles + browse hero); small counts, high visibility
  document.querySelectorAll('[data-portal-flag]').forEach(el => {
    if(el.classList.contains('loaded')) return;
    const fid = el.dataset.portalFlag;
    const found = fid && findEntry(fid);
    if(!found) return;
    fetchMediaQueued(found.item).then(md => {
      const url = md && (md.backdrop || md.poster);
      if(!url) return;
      const img = new Image();
      img.referrerPolicy = 'no-referrer';
      img.onload = () => { el.style.backgroundImage = `url(${img.src})`; el.classList.add('loaded'); _backdropUrlById[fid] = img.src; };
      img.onerror = () => {};
      img.src = url;
    });
  });
}

/* ===================== LAZY POSTER LOADING ===================== */
let _cardIO = null;
function initCardImages(){
  const cards = document.querySelectorAll('.movie-card[data-entry-id], .tl-row[data-entry-id]');
  if(!cards.length) return;
  if(_cardIO) _cardIO.disconnect();
  _cardIO = new IntersectionObserver((entries) => {
    entries.forEach(en => {
      if(!en.isIntersecting) return;
      _cardIO.unobserve(en.target);
      const id = en.target.dataset.entryId;
      const imgEl = en.target.querySelector('.mc-poster-img, .tl-poster-img');
      if(imgEl && imgEl.classList.contains('loaded')) return; // already shown from cache
      const found = findEntry(id);
      if(!found) return;
      const bgEl = en.target.querySelector('.mc-poster-bg, .tl-poster-bg');
      fetchMediaQueued(found.item).then(md => {
        if(bgEl) bgEl.classList.remove('pending');
        if(md && md.poster && imgEl){
          const img = new Image();
          img.referrerPolicy = 'no-referrer';
          img.onload = () => { imgEl.style.backgroundImage = `url(${img.src})`; imgEl.classList.add('loaded'); _posterUrlById[id] = img.src; };
          img.onerror = () => {};
          img.src = md.poster;
        }
      });
    });
  }, {rootMargin:'300px 0px'});
  cards.forEach(c => _cardIO.observe(c));
}

document.addEventListener('click', e => {

  if(e.target.closest('[data-auth-open]')){ openAuthPanel(isSignedIn()?'account':'signin'); return; }
  if(e.target.classList.contains('auth-overlay') || e.target.closest('.auth-x')){ closeAuthPanel(); return; }

    const p=e.target.closest('.auth-panel');

    const email=p.querySelector('[data-af="email"]')?.value;
    const pass=p.querySelector('[data-af="pass"]')?.value;
    if(auth.mode==='signup') doSignUp(name,email,pass); else doSignIn(email,pass);
    return;
  }
  if(e.target.closest('[data-signout]')){ signOut(); return; }
  if(e.target.closest('[data-auth-go]')){ closeAuthPanel(); /* fall through to data-nav below */ }
  const bt = e.target.closest('[data-browsetype]');
  if(bt){ state.browseType = bt.dataset.browsetype; refreshBrowseResults(); document.querySelectorAll('[data-browsetype]').forEach(x=>x.classList.toggle('active', x.dataset.browsetype===state.browseType)); return; }
  // topbar search: toggle open/closed; closing clears the query
  if(e.target.closest('[data-tbsearch-toggle]')){
    setTbSearch(!state.tbSearchOpen, true);
    return;
  }
  const hd = e.target.closest('[data-herodot]');
  if(hd){ heroGo(+hd.dataset.herodot); heroStart(); return; }
  const ha = e.target.closest('[data-heroarrow]');
  if(ha){ heroGo(_heroIdx + (ha.dataset.heroarrow==='next'?1:-1)); heroStart(); return; }
  const pad = e.target.closest('[data-paddle]');
  if(pad){
    const strip = pad.closest('.nf-strip-wrap')?.querySelector('.nf-strip');
    // paddles are PHYSICAL (prev pinned left, next pinned right) and scrollBy's `left`
    // is physical in both directions (RTL scrollLeft runs -max..0), so no dir flip here
    if(strip){ const step = strip.clientWidth * .85 * (pad.dataset.paddle==='next' ? 1 : -1);
      strip.scrollBy({left: step, behavior:'smooth'}); }
    return;
  }
  const pu = e.target.closest('[data-playurl]');
  if(pu){ e.stopPropagation(); playDirect(pu.dataset.playurl); return; }
  const al = e.target.closest('[data-addlink]');
  if(al){ e.stopPropagation();
    const wrap = al.closest('.dmodal-links');
    const label = wrap?.querySelector('[data-lf="label"]')?.value?.trim();
    const url = wrap?.querySelector('[data-lf="url"]')?.value?.trim();
    if(url && /^https?:\/\//i.test(url)){
      const m = loadLinks(); const id = al.dataset.addlink;
      (m[id] = m[id] || []).push({label: label || 'Link', url});
      saveLinks(m); logEvent('link_add', id); refreshLinksSection(id);
    }
    return;
  }
  const rl = e.target.closest('[data-removelink]');
  if(rl){ e.stopPropagation();
    const m = loadLinks(); const id = rl.dataset.linkitem;
    if(m[id]){ m[id].splice(+rl.dataset.removelink, 1); if(!m[id].length) delete m[id]; saveLinks(m); refreshLinksSection(id); }
    return;
  }
  // bookmark toggle — intercept before card opens
  const bm = e.target.closest('[data-bookmark]');
  if(bm){ e.stopPropagation();
    if(!isSignedIn()){ openAuthPanel('signin'); return; }
    toggleBookmark(bm.dataset.bookmark, bm); return; }
  // trailer play — swap thumbnail for the embedded player
  const tp = e.target.closest('[data-trailer-play]');
  if(tp){ e.stopPropagation(); playTrailer(tp.dataset.trailerPlay, tp.closest('.trailer-frame')); return; }
  // character card → its actors
  const ch = e.target.closest('[data-char]');
  if(ch){ openCharacter(ch.dataset.char); return; }
  // entry-id check next so clicking anywhere else on the card opens the detail
  const entryEl = e.target.closest('[data-entry-id]');
  if(entryEl && !e.target.closest('[data-modal-close],[data-dmodal-close]')){
    openEntry(entryEl.dataset.entryId); return;
  }
  const el = e.target.closest('[data-enter-brand],[data-back],[data-nav],[data-home],[data-tab],[data-lang],[data-type-chip],[data-imp-chip],[data-comic],[data-modal-close],[data-dmodal-close],[data-vtoggle],[data-sb-toggle]');

  else if(el.dataset.nav){ navTo(el.dataset.nav); }
  else if(el.dataset.tab){ setView(el.dataset.tab); }
  else if(el.dataset.lang){ if(state.lang!==el.dataset.lang){ state.lang=el.dataset.lang; try{localStorage.setItem('cv_lang',state.lang);}catch(e){} _skipReveal=true; renderFull(); } }

  else if(el.dataset.comic){ state.modal=el.dataset.comic; document.getElementById('app').insertAdjacentHTML('beforeend', renderModal()); }

  else if(el.dataset.dmodalClose){ closeEntryModal(); }

/* single source of truth for the topbar search's open/closed DOM state */
function setTbSearch(open, clearQuery){
  state.tbSearchOpen = open;
  const wrap = document.querySelector('.tb-search');
  if(wrap){
    wrap.classList.toggle('open', open);
    const inp = wrap.querySelector('[data-tbsearch]');
    const btn = wrap.querySelector('[data-tbsearch-toggle]');
    if(inp) inp.tabIndex = open ? 0 : -1;
    if(btn) btn.setAttribute('aria-expanded', String(open));
    if(open){ if(inp) inp.focus(); }
    else if(inp){ inp.blur(); if(clearQuery) inp.value = ''; }
  }
  if(!open && clearQuery && state.browseSearch){
    state.browseSearch = '';
    if(state.page === 'browse') refreshBrowseResults();
  }

/* ===================== MEDIA PIPELINE — TMDB (primary) + Wikipedia (fallback) =====================
   Paste a FREE key from https://www.themoviedb.org/settings/api below to unlock real posters,
   Farsi summaries, trailers, cast lists and live ratings. It's fetched in the browser, so it
   works on GitHub Pages with no server. If left blank, Wikipedia is used automatically.        */
const TMDB_KEY = 'd75c0bec86515a717f9ca22715932002';
const TMDB_IMG = 'https://image.tmdb.org/t/p/';

const _mediaCache = {};
const _mediaPromises = {};
const _posterUrlById = {}; // synchronous poster cache — keeps images from flashing on re-render
const _backdropUrlById = {}; // same, for wide backdrop imagery (home tiles, brand hero)

function tmdbLang(){ return state.lang === 'fa' ? 'fa-IR' : 'en-US'; }
function yearOf(item){ const m = String(item.year).match(/\d{4}/); return m ? m[0] : ''; }

/* Pin catalog entries whose free-text search lands on the wrong TMDB record.
   itemId → {kind:'movie'|'tv', id:<tmdb id>} — checked before any search.
   {skip:true} marks titles that aren't on TMDB at all (Wikipedia takes over). */
const TMDB_OVERRIDES = {
  m_iamgroot1: {kind:'tv', id:232125},   // search hits the "Groot's First Steps" short film
  m_iamgroot2: {kind:'tv', id:232125},
  ww_dh2:      {kind:'movie', id:12445}, // search returns Part 1 for the Part 2 query
  d_authority: {skip:true},              // announced DC film, no TMDB page yet — search grabs "The Central Authority"
};
/* season/part suffixes and en-dashes confuse TMDB search — query the clean name */
function tmdbQueryName(item){
  return item.name
    .replace(/\((Seasons?|Parts?|Vol\.?|Chapters?|Book)[^)]*\)/ig, '')
    .replace(/\((US|UK|HBO Series)\)/ig, '')
    .replace(/[–—]/g, ' ')
    .replace(/\s+/g, ' ').trim();
}
/* 'animation' covers both films and series: a year RANGE means a series, one year means a film */
function tmdbKindGuess(item){
  if(item.type === 'film') return 'movie';
  if(item.type === 'series') return 'tv';
  return /[–—-]/.test(String(item.year)) ? 'tv' : 'movie'; // animation + specials
}

async function apiGet(url){
  try { const r = await fetch(url); return r.ok ? await r.json() : null; } catch(e){ return null; }
}
function pickTrailer(videos){
  const yt = (videos?.results || []).filter(v => v.site === 'YouTube');
  const v = yt.find(x => x.type==='Trailer' && x.official) || yt.find(x => x.type==='Trailer')
         || yt.find(x => x.type==='Teaser') || yt[0];
  return v ? v.key : null;
}
async function tmdbSearchKind(kind, q, yr){
  const yq = yr ? (kind==='tv' ? `&first_air_date_year=${yr}` : `&year=${yr}`) : '';
  const s = await apiGet(`https://api.themoviedb.org/3/search/${kind}?api_key=${TMDB_KEY}&query=${q}${yq}&include_adult=false`);
  return s?.results?.[0] || null;
}
async function tmdbFetch(item){
  if(!TMDB_KEY) return null;
  const ov = TMDB_OVERRIDES[item.id];
  if(ov && ov.skip) return null; // known not to exist on TMDB — go straight to Wikipedia
  let kind = (ov && ov.kind) || tmdbKindGuess(item);
  let hit = null;
  if(ov && ov.id){
    hit = { id: ov.id }; // pinned — skip search entirely
  } else {
    const q = encodeURIComponent(tmdbQueryName(item));
    const yr = yearOf(item);
    const other = kind === 'tv' ? 'movie' : 'tv';
    const crossKind = item.type === 'animation' || item.type === 'special';
    // year-scoped first (split seasons air later than the show's first_air_date, hence the
    // unscoped retries); animation/specials also try the other medium before giving up
    hit = await tmdbSearchKind(kind, q, yr);
    if(!hit && crossKind && yr){ const h = await tmdbSearchKind(other, q, yr); if(h){ hit = h; kind = other; } }
    if(!hit && yr) hit = await tmdbSearchKind(kind, q, '');
    if(!hit && crossKind){ const h = await tmdbSearchKind(other, q, ''); if(h){ hit = h; kind = other; } }
    if(!hit) return null;
  }
  const details = await apiGet(`https://api.themoviedb.org/3/${kind}/${hit.id}?api_key=${TMDB_KEY}&language=${tmdbLang()}&append_to_response=videos,credits,external_ids&include_video_language=en,fa,null`);
  if(!details && !hit.poster_path) return null;
  let overview = details?.overview || hit.overview || '';
  let overviewLang = (details?.overview && state.lang==='fa') ? 'fa' : 'en';
  if(!overview && state.lang==='fa'){
    const en = await apiGet(`https://api.themoviedb.org/3/${kind}/${hit.id}?api_key=${TMDB_KEY}&language=en-US`);
    overview = en?.overview || ''; overviewLang = 'en';
  }
  const posterPath = hit.poster_path || details?.poster_path;
  const backdropPath = hit.backdrop_path || details?.backdrop_path;
  return {
    source:'TMDB', kind, tmdbId: hit.id,
    imdbId: details?.external_ids?.imdb_id || null,
    poster: posterPath ? `${TMDB_IMG}w500${posterPath}` : null,
    backdrop: backdropPath ? `${TMDB_IMG}w1280${backdropPath}` : null,
    overview, overviewLang,
    rating: (details?.vote_average || hit.vote_average) || null,
    trailer: pickTrailer(details?.videos),
    cast: (details?.credits?.cast || []).slice(0,14).map(c => ({
      name:c.name, character:c.character, id:c.id,
      profile: c.profile_path ? `${TMDB_IMG}w185${c.profile_path}` : null
    })),
    url: `https://www.themoviedb.org/${kind}/${hit.id}`
  };
}

/* ---- Wikipedia fallback (no key needed) ---- */
const _wikiCache = {};
async function wikiSearchTitle(query, lang){
  const data = await apiGet(`https://${lang}.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=1`);
  return data?.query?.search?.[0]?.title || null;
}
async function wikiSummaryFor(title, lang){
  return await apiGet(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title.replace(/ /g,'_'))}`);
}
async function wikiFetch(item){
  const lang = state.lang === 'fa' ? 'fa' : 'en';
  const key = item.id + '_' + lang;
  if(_wikiCache[key] !== undefined) return _wikiCache[key];
  const query = `${tmdbQueryName(item)}${yearOf(item)?` ${yearOf(item)}`:''} film`;
  let title = await wikiSearchTitle(query, lang);
  let summary = title ? await wikiSummaryFor(title, lang) : null;
  let enResult = null;
  if(lang==='fa' && (!summary || !summary.extract)){
    const enTitle = await wikiSearchTitle(query, 'en');
    enResult = enTitle ? await wikiSummaryFor(enTitle, 'en') : null;
  }
  if(!summary && enResult) summary = enResult;
  const result = summary ? {
    image: summary.thumbnail?.source || summary.originalimage?.source || enResult?.thumbnail?.source || null,
    extract: summary.extract || enResult?.extract || '',
    lang: (summary.extract && lang==='fa') ? 'fa' : 'en',
    url: summary.content_urls?.desktop?.page || `https://${lang}.wikipedia.org/wiki/${encodeURIComponent(title||'')}`
  } : null;
  _wikiCache[key] = result;
  return result;
}

/* ---- Unified fetch: TMDB first, fill any gaps from Wikipedia ---- */
function fetchMedia(item){
  const lang = state.lang === 'fa' ? 'fa' : 'en';
  const key = item.id + '_' + lang;
  if(_mediaCache[key] !== undefined) return Promise.resolve(_mediaCache[key]);
  if(_mediaPromises[key]) return _mediaPromises[key];
  const p = (async () => {
    let out = await tmdbFetch(item);
    if(!out || !out.poster || !out.overview){
      const wd = await wikiFetch(item);
      if(wd){
        out = out || { source:'Wikipedia', cast:[], trailer:null, rating:null };
        if(!out.poster) out.poster = wd.image;
        if(!out.overview){ out.overview = wd.extract; out.overviewLang = wd.lang; if(out.source!=='TMDB') out.source='Wikipedia'; out.url = out.url || wd.url; }
      }
    }
    _mediaCache[key] = out || null;
    delete _mediaPromises[key];
    return out || null;
  })();
  _mediaPromises[key] = p;
  return p;
}

/* concurrency-limited fetching — posters and person photos share one queue */
let _mediaInFlight = 0; const _mediaQueue = []; const MEDIA_MAX = 6;
function queuedFetch(runner){
  return new Promise(resolve => {
    const run = () => { _mediaInFlight++; runner().then(r => { _mediaInFlight--; resolve(r); _drainMedia(); }); };
    if(_mediaInFlight < MEDIA_MAX) run(); else _mediaQueue.push(run);
  });
}
function fetchMediaQueued(item){ return queuedFetch(() => fetchMedia(item)); }
function _drainMedia(){ while(_mediaInFlight < MEDIA_MAX && _mediaQueue.length) _mediaQueue.shift()(); }

/* ===================== ENTRY DETAIL MODAL ===================== */
function findEntry(id){
  for(const b of Object.keys(DATA)){
    const found = (DATA[b]||[]).find(x => x.id === id);
    if(found) return { item:found, brand:b };
  }
  return null;
}
async function loadEntryMedia(item){
  const spinner = document.getElementById('dm-spin');
  const posterEl = document.querySelector('.dmodal-poster');
  const backdropEl = document.querySelector('.dmodal-backdrop');
  const plotEl = document.querySelector('.dmodal-plot');
  const sourceEl = document.querySelector('.dmodal-source');
  const summaryLabel = document.querySelector('.dmodal-summary-label');
  const trailerWrap = document.querySelector('.dmodal-trailer');
  const castWrap = document.querySelector('.dmodal-cast');
  const setImg = (el, url, cacheId) => {
    if(!el || !url) return;
    const img = new Image();
    img.referrerPolicy = 'no-referrer';
    img.onload = () => { el.style.backgroundImage = `url(${img.src})`; el.classList.add('loaded'); if(cacheId) _posterUrlById[cacheId] = img.src; };
    img.onerror = () => {};
    img.src = url;
  };
  const setPoster = (url) => setImg(posterEl, url, item.id);
  const md = await fetchMedia(item);
  if(spinner) spinner.style.display = 'none';
  if(md){
    if(md.poster) setPoster(md.poster);
    // cinematic hero: prefer a wide backdrop, fall back to the poster
    setImg(backdropEl, md.backdrop || md.poster, null);
    if(md.overview){
      if(summaryLabel) summaryLabel.style.display = 'block';
      if(plotEl){ plotEl.textContent = md.overview; plotEl.style.display = 'block'; plotEl.setAttribute('dir', md.overviewLang==='fa'?'rtl':'ltr'); }
      if(sourceEl && md.url){ sourceEl.innerHTML = `<a href="${md.url}" target="_blank" rel="noopener">${t('sourceLabel')}: ${escapeHtml(md.source||'')} ↗</a>`; sourceEl.style.display = 'block'; }
    }
    // trailer
    if(md.trailer && trailerWrap){
      trailerWrap.innerHTML = `
        <div class="dmodal-sec-label">${t('trailerLabel')}</div>
        <div class="trailer-frame" data-trailer="${md.trailer}">
          <div class="trailer-thumb" style="background-image:url(https://i.ytimg.com/vi/${md.trailer}/hqdefault.jpg)">
            <button class="trailer-play" data-trailer-play="${md.trailer}" aria-label="${t('trailerLabel')}">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>
          </div>
        </div>`;
      trailerWrap.style.display = 'block';
    }
    // cast
    if(md.cast && md.cast.length && castWrap){
      const chips = md.cast.slice(0,10).map(c => `
        <button class="cast-chip" data-person="${c.id}" title="${escapeHtml(c.name)}${c.character?' — '+escapeHtml(c.character):''}">
          <span class="cast-face"${c.profile?` style="background-image:url(${c.profile})"`:''}>${c.profile?'':escapeHtml((c.name||'?').charAt(0))}</span>
          <span class="cast-meta"><span class="cast-name">${escapeHtml(c.name)}</span>${c.character?`<span class="cast-role">${escapeHtml(c.character)}</span>`:''}</span>
        </button>`).join('');
      castWrap.innerHTML = `<div class="dmodal-sec-label">${t('castLabel')}</div><div class="cast-row">${chips}</div>`;
      castWrap.style.display = 'block';
    }
  }
  if(plotEl && !plotEl.textContent){ plotEl.textContent = t('noSummary'); plotEl.style.display = 'block'; plotEl.style.opacity = '.6'; }
}
function openEntry(id){
  const found = findEntry(id);
  if(!found) return;
  const { item, brand } = found;
  state.entryModal = id;
  const existing = document.querySelector('.dmodal-back');
  if(existing) existing.remove();
  document.getElementById('app').insertAdjacentHTML('beforeend', renderEntryModal(item, brand));
  loadEntryMedia(item);
}
function closeEntryModal(){
  state.entryModal = null;
  const m = document.querySelector('.dmodal-back');
  if(m) m.remove();
}

        <div class="dmodal-ext">

          <a class="ext-link" href="${wikiUrl}" target="_blank" rel="noopener">${ic('globe')}<span>Wikipedia</span></a>

        </div>
      </div>
    </div>
  </div>`;
}

/* ===================== WATCH ORDER (chronological) =====================
   Ordered by in-universe chronology, not release date. Each id points to an
   existing catalogue entry; split seasons/parts collapse to one position. */
const WATCH_ORDER = {
  starwars: [
    'sw_acolyte', // High Republic — ~100 years before the Skywalker saga
    'sw_toj',     // Tales of the Jedi
    'sw_tpm',     // Episode I
    'sw_aotc',    // Episode II
    'sw_tcw',     // The Clone Wars (film + series)
    'sw_rots',    // Episode III
    'sw_bad',     // The Bad Batch (right after Order 66)
    'sw_solo',    // Solo
    'sw_obi',     // Obi-Wan Kenobi
    'sw_rebels',  // Rebels
    'sw_andor',   // Andor
    'sw_r1',      // Rogue One
    'sw_anh',     // Episode IV
    'sw_esb',     // Episode V
    'sw_rotj',    // Episode VI
    'sw_mando',   // The Mandalorian
    'sw_bobf',    // The Book of Boba Fett
    'sw_ahsoka',  // Ahsoka
    'sw_skel',    // Skeleton Crew
    'sw_tfa',     // Episode VII
    'sw_tlj',     // Episode VIII
    'sw_tros',    // Episode IX
  ],
};
function applyWatchOrder(){
  Object.entries(WATCH_ORDER).forEach(([brand, order]) => {
    const arr = DATA[brand] || [];
    order.forEach((id, i) => {
      const it = arr.find(x => x.id === id);
      if(it){ it.wo = i + 1; if(!it.views.includes('timeline')) it.views.push('timeline'); }
    });
  });
}
function brandHasWatchOrder(brand){ return (DATA[brand]||[]).some(it => typeof it.wo === 'number'); }

/* ===================== BOOT ===================== */
applyWatchOrder();
setBrandTheme(null);
renderFull();
